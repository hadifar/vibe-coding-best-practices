title: Agentic Software Development Playbook
description: A practical guide to agentic software development — concepts, tools, workflows, and resources.
baseurl: "/agentic-software-development-playbook"
url: "https://hadifar.github.io"

theme: just-the-docs

# Just the Docs settings
color_scheme: light
search_enabled: true
heading_anchors: true
logo: "/assets/images/logo.png"
favicon_ico: "/favicon.ico"



nav_sort: default
nav_external_links:
  - title: GitHub
    url: https://github.com/hadifar/agentic-software-development-playbook

aux_links:
  "Home":
    - "/agentic-software-development-playbook/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap


exclude:
  - _inbox/
  - .claude/

defaults:
  - scope:
      path: "docs"
    values:
      layout: default
