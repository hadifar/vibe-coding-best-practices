title: Vibe Coding & Agentic Coding
description: A practical guide to vibe-coding and agentic coding — concepts, tools, workflows, and resources.
baseurl: "/vibe-coding-best-practices"
url: "https://hadifar.github.io"

theme: just-the-docs

# Just the Docs settings
color_scheme: light
search_enabled: true
heading_anchors: true
logo: "/assets/images/logo.png"
favicon_ico: "/favicon.ico"



nav_sort: default
nav_external_links:
  - title: GitHub
    url: https://github.com/hadifar/vibe-coding-best-practices

aux_links:
  "Home":
    - "/vibe-coding-best-practices/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: "docs"
    values:
      layout: default
